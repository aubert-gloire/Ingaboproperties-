<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Forest green background -->
  <rect width="32" height="32" rx="6" fill="#0a1f15"/>

  <!-- Left building -->
  <rect x="3" y="21" width="7" height="9" fill="#d9a441" rx="0.5"/>
  <rect x="4.5" y="23" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>
  <rect x="7" y="23" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>

  <!-- Center tall building with spire -->
  <polygon points="16,3 13,10 19,10" fill="white"/>
  <rect x="13" y="10" width="6" height="20" fill="white" rx="0.5"/>
  <rect x="14.5" y="12" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>
  <rect x="17" y="12" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>
  <rect x="14.5" y="16" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>
  <rect x="17" y="16" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>
  <rect x="14.5" y="20" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>
  <rect x="17" y="20" width="1.5" height="2" fill="#0a1f15" opacity="0.25"/>

  <!-- Right building -->
  <rect x="22" y="16" width="7" height="14" fill="#d9a441" rx="0.5"/>
  <rect x="23.5" y="18" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>
  <rect x="26" y="18" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>
  <rect x="23.5" y="22" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>
  <rect x="26" y="22" width="1.5" height="2" fill="#0a1f15" opacity="0.45"/>

  <!-- Gold base line -->
  <rect x="2" y="29.5" width="28" height="1.5" fill="#d9a441" rx="0.5"/>
</svg>
